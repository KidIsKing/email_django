{% extends 'mail/base.html' %}

{% block content %}
    <style>
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
            box-sizing: border-box;
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #007bff;
        }
        
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        
        button:hover {
            background: #0056b3;
        }
        
        .cancel-link {
            margin-left: 10px;
            color: #666;
            text-decoration: none;
        }
        
        .cancel-link:hover {
            color: #333;
        }
    </style>
    
    <h2 style="margin-top: 0;">✏️ Написать письмо</h2>
    
    <form method="post">
        {% csrf_token %}
        
        <div class="form-group">
            <label>Отправитель:</label>
            <input type="text" name="sender" required>
        </div>
        
        <div class="form-group">
            <label>Получатель:</label>
            <input type="text" name="recipient" required>
        </div>
        
        <div class="form-group">
            <label>Тема:</label>
            <input type="text" name="subject" required>
        </div>
        
        <div class="form-group">
            <label>Текст письма:</label>
            <textarea name="body" rows="8" required></textarea>
        </div>
        
        <button type="submit">📤 Отправить</button>
        <a href="{% url 'mail:inbox' %}" class="cancel-link">Отмена</a>
    </form>
{% endblock %}
